name: GuardGovernance
version: '1.0.0-SNAPSHOT'
main: ru.guardsystem.GuardGovernancePlugin
api-version: '1.21'
author: GuardSystem
commands:
  voteban:
    description: Start vote-ban for a player.
    usage: /voteban <nick> <reason>
  vote:
    description: Cast a vote in active rollback session.
    usage: /vote <yes|no>
  guard:
    description: Guard governance commands including GUI, transfer and rollback.
    usage: /guard gui | /guard admin <add|remove> <player> | /guard transfer <player> | /guard rollback <request|execute|status>
