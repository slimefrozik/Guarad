name: GuardGovernance
version: '1.0.0-SNAPSHOT'
main: ru.guardsystem.GuardGovernancePlugin
api-version: '1.21'
author: GuardSystem
commands:
  voteban:
    description: Start vote-ban for a player.
    usage: /voteban <nick> <reason>
  vote:
    description: Cast a vote in active session.
    usage: /vote <yes|no>
  guard:
    description: Manage guard governance voting.
    usage: /guard <nominate|impeach> <nick>
