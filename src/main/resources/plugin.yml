name: GuardGovernance
version: '1.0.0-SNAPSHOT'
main: ru.guardsystem.GuardGovernancePlugin
api-version: '1.21'
author: GuardSystem
commands:
  voteban:
    description: Запуск голосования за бан игрока.
    usage: /voteban <ник> <причина>
  vote:
    description: Голос в активной rollback-сессии.
    usage: /vote <yes|no>
  guard:
    description: Команды управления Guard, GUI, transfer и rollback.
    usage: /guard gui | /guard admin <add|remove> <игрок> | /guard transfer <игрок> | /guard rollback <request|execute|status>
